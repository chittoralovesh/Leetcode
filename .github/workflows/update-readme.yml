name: Update README with LeetCode Stats

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Generate README stats
        run: python scripts/generate_readme.py

      - name: Commit and push changes
        run: |
          git config user.email "281591568+chittoralovesh@users.noreply.github.com"
          git config user.name "Lovesh Chittora"
          git add README.md topics_cache.json
          git diff --cached --quiet || (git commit -m "Auto-update README with LeetCode stats [skip ci]" && git push)
